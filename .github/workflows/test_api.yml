on:
  push:
    paths:
      - src/**
      - requirements.txt
      - pytest.ini
      - .github/workflows/test_api.yml
  pull_request:
    paths:
      - src/**
      - requirements.txt
      - pytest.ini
      - .github/workflows/test_api.yml

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.7"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: pytest src/test/test_api.py
